<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기억 세탁소 · The Memory Laundromat</title>
<style>
  :root {
    --lavender: #eae4fb;
    --mint: #e2f7f1;
    --card-bg: rgba(255, 255, 255, 0.72);
    --card-border: rgba(255, 255, 255, 0.9);
    --ink: #4a4462;
    --ink-soft: #7c7495;
    --pink: #ffb8c9;
    --pink-deep: #ff8fa8;
    --purple: #c6a9f0;
    --purple-deep: #a97ee0;
    --teal: #93e3cf;
    --teal-deep: #5fcdae;
    --gold: #ffcf7a;
    --shadow: 0 10px 30px rgba(120, 100, 160, 0.15);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI",
      system-ui, sans-serif;
    color: var(--ink);
  }

  body {
    background: linear-gradient(135deg, #e0e5ff 0%, #f0f7ff 50%, #e6fff9 100%);
    min-height: 100vh;
    padding: 28px 16px 60px;
  }

  h1, h2, h3, p { margin: 0; }

  .title-bar {
    text-align: center;
    margin-bottom: 22px;
  }

  .title-bar h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--ink);
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(179, 229, 252, 0.4);
  }

  .title-bar span {
    display: block;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: 3px;
  }

  .app-grid {
    display: grid;
    grid-template-columns: 1fr 1.35fr 1fr;
    gap: 20px;
    max-width: 1240px;
    margin: 0 auto;
    align-items: stretch;
  }

  .panel {
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 24px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 22px;
    display: flex;
    flex-direction: column;
    min-height: 640px;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  /* ---------- LEFT: CUSTOMER ZONE ---------- */
  .customer-zone { align-items: center; text-align: center; }

  .progress-pill {
    align-self: center;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--purple-deep);
    margin-bottom: 14px;
    box-shadow: 0 2px 6px rgba(120, 100, 160, 0.12);
  }

  .customer-portrait {
    width: 150px;
    height: 170px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .customer-portrait.show { opacity: 1; transform: translateY(0); }
  .customer-portrait.leaving { opacity: 0; transform: translateY(-16px) scale(0.94); }

  .customer-name {
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .customer-emotion-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--purple), var(--purple-deep));
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .dialogue-box {
    position: relative;
    width: 100%;
    background: #ffffff;
    border-radius: 18px;
    padding: 16px 18px;
    min-height: 96px;
    box-shadow: 0 6px 16px rgba(120, 100, 160, 0.12);
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    text-align: left;
  }

  .dialogue-box::after {
    content: "";
    position: absolute;
    left: 26px;
    top: -9px;
    width: 16px;
    height: 16px;
    background: #ffffff;
    transform: rotate(45deg);
    border-radius: 3px;
  }

  .dialogue-text::after {
    content: "▌";
    color: var(--purple-deep);
    animation: blink 1s step-end infinite;
  }
  .dialogue-text.done::after { content: ""; }

  @keyframes blink { 50% { opacity: 0; } }

  .char-fade {
    display: inline-block;
    white-space: pre;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .char-fade.visible { opacity: 1; transform: translateY(0); }

  .item-tag {
    margin-top: 16px;
    font-size: 12px;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.7);
    border-radius: 12px;
    padding: 8px 12px;
    width: 100%;
  }
  .item-tag b { color: var(--ink); }

  /* ---------- CENTER: WASHER ZONE ---------- */
  .washer-zone { align-items: center; position: relative; overflow: hidden; }

  .decor-carpet {
    position: absolute;
    bottom: 46px;
    left: 50%;
    width: 260px;
    height: 90px;
    transform: translateX(-50%) scale(0.85);
    background: radial-gradient(ellipse at center, #ffd7e2 0%, #ffe6ee 55%, transparent 75%);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.6s ease;
    z-index: 0;
  }
  .decor-carpet.visible { opacity: 0.9; transform: translateX(-50%) scale(1); }

  .decor-plant {
    position: absolute;
    left: 14px;
    bottom: 18px;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    z-index: 2;
  }
  .decor-plant.visible { opacity: 1; transform: translateY(0); }

  .decor-lights {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 2;
  }
  .decor-lights.visible { opacity: 1; }
  .decor-lights svg circle { animation: twinkle 1.8s ease-in-out infinite; }
  .decor-lights svg circle:nth-child(2n) { animation-delay: 0.4s; }
  .decor-lights svg circle:nth-child(3n) { animation-delay: 0.8s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .washer-stage {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 44px auto 18px;
    z-index: 1;
  }

  .washer-stage.shaking { animation: shake 0.5s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0) rotate(0); }
    20% { transform: translateX(-8px) rotate(-1.5deg); }
    40% { transform: translateX(8px) rotate(1.5deg); }
    60% { transform: translateX(-6px) rotate(-1deg); }
    80% { transform: translateX(6px) rotate(1deg); }
  }

  .drum-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 168px;
    height: 168px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    z-index: 3;
  }

  .item-icon {
    width: 56px;
    height: 56px;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .item-icon.show { opacity: 1; transform: scale(1); }

  .washer-spin .drum-overlay svg#washerDrum { animation: drumSpin 1.1s linear infinite; }
  @keyframes drumSpin { to { transform: rotate(360deg); } }

  .orbit-word {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    animation: orbitSpin 2.6s linear infinite;
  }
  @keyframes orbitSpin { to { transform: rotate(360deg); } }

  .orbit-word-inner {
    position: absolute;
    left: 0;
    top: 0;
    transform: translate(-50%, -74px);
    animation: counterSpin 2.6s linear infinite;
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(90, 80, 110, 0.85);
    color: #f2f0fa;
    transition: background 0.7s ease, color 0.7s ease, box-shadow 0.7s ease, transform 0.4s ease;
  }
  @keyframes counterSpin { to { transform: translate(-50%, -74px) rotate(-360deg); } }

  .orbit-word-inner.positive {
    background: linear-gradient(135deg, #fff2b8, #ffe08a);
    color: #7a5a12;
    box-shadow: 0 0 14px rgba(255, 214, 120, 0.9), 0 0 4px #fff8dd inset;
  }

  .orbit-word.fade-out { opacity: 0; transition: opacity 0.6s ease; }

  .bubble-particle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffffff, #bfe9ff 60%, #8fd4f5 100%);
    opacity: 0.95;
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
  }

  .sparkle-burst {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .washer-hint {
    min-height: 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--pink-deep);
    text-align: center;
    margin-top: 4px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .washer-hint.show { opacity: 1; }

  .detergent-row {
    display: flex;
    gap: 12px;
    margin-top: auto;
    width: 100%;
    justify-content: center;
    padding-top: 10px;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .detergent-btn {
    flex: 1;
    max-width: 150px;
    border: none;
    border-radius: 18px;
    padding: 12px 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 800;
    color: #ffffff;
    box-shadow: 0 8px 16px rgba(120, 100, 160, 0.22);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), filter 0.2s ease;
    animation: float 3.2s ease-in-out infinite;
  }
  .detergent-btn:nth-child(2) { animation-delay: 0.3s; }
  .detergent-btn:nth-child(3) { animation-delay: 0.6s; }
  .detergent-btn:hover:not(:disabled) {
    animation-play-state: paused;
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 14px 24px rgba(120, 100, 160, 0.3);
  }
  .detergent-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
  .detergent-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(0.3); animation-play-state: paused; }

  .btn-comfort { background: linear-gradient(160deg, var(--pink), var(--pink-deep)); }
  .btn-time { background: linear-gradient(160deg, var(--purple), var(--purple-deep)); }
  .btn-courage { background: linear-gradient(160deg, var(--teal), var(--teal-deep)); }

  /* ---------- RIGHT: SHOP ZONE ---------- */
  .shop-zone { }

  .coin-display {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #fff6df, #ffe9b8);
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 18px;
    box-shadow: 0 6px 14px rgba(200, 160, 60, 0.2);
  }
  .coin-display .coin-amount {
    font-size: 22px;
    font-weight: 800;
    color: #8a6a1a;
  }
  .coin-display .coin-label { font-size: 12px; color: #a5883f; font-weight: 700; }
  .coin-amount.bump { animation: coinBump 0.4s ease; }
  @keyframes coinBump { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 100% { transform: scale(1); } }

  .shop-list { display: flex; flex-direction: column; gap: 12px; }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 4px 10px rgba(120, 100, 160, 0.1);
  }

  .shop-item-icon {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f1fe;
    border-radius: 12px;
  }

  .shop-item-info { flex: 1; }
  .shop-item-name { font-size: 13px; font-weight: 800; margin-bottom: 2px; }
  .shop-item-price { font-size: 12px; color: var(--ink-soft); font-weight: 700; }

  .buy-btn {
    border: none;
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    background: linear-gradient(135deg, var(--purple), var(--purple-deep));
    color: #fff;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.15s ease;
  }
  .buy-btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 16px rgba(120, 100, 160, 0.28); }
  .buy-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
  .buy-btn:disabled {
    background: #dcd6e8;
    color: #ffffff;
    cursor: not-allowed;
  }

  .shop-footer-note {
    margin-top: auto;
    font-size: 12px;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.6);
    border-radius: 12px;
    padding: 10px 12px;
    line-height: 1.5;
  }

  /* ---------- ENDING MODAL ---------- */
  .ending-overlay {
    position: fixed;
    inset: 0;
    background: rgba(70, 60, 100, 0.45);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 50;
    padding: 20px;
  }
  .ending-overlay.visible { opacity: 1; pointer-events: auto; }

  .ending-card {
    background: linear-gradient(160deg, #ffffff, #f5f0ff);
    border-radius: 28px;
    padding: 40px 34px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 30px 60px rgba(60, 40, 90, 0.35);
    transform: translateY(24px) scale(0.96);
    transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  .ending-overlay.visible .ending-card { transform: translateY(0) scale(1); }

  .ending-card h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 14px;
    color: var(--purple-deep);
  }

  .ending-card p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink);
    margin-bottom: 22px;
    white-space: pre-line;
  }

  .ending-restart {
    border: none;
    border-radius: 999px;
    padding: 12px 26px;
    font-size: 13px;
    font-weight: 800;
    font-family: inherit;
    color: #fff;
    cursor: pointer;
    background: linear-gradient(135deg, var(--pink), var(--purple-deep));
    box-shadow: 0 10px 20px rgba(160, 120, 200, 0.35);
  }

  @media (max-width: 980px) {
    .app-grid { grid-template-columns: 1fr; }
    .panel { min-height: unset; }
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>🧺 기억 세탁소</h1>
  <span>THE MEMORY LAUNDROMAT</span>
</div>

<div class="app-grid">

  <!-- LEFT: CUSTOMER ZONE -->
  <section class="panel customer-zone">
    <div class="panel-title">CUSTOMER</div>
    <div class="progress-pill" id="progressPill">0 / 3</div>

    <div class="customer-portrait" id="customerPortrait"></div>
    <div class="customer-name" id="customerName">&nbsp;</div>
    <div class="customer-emotion-tag" id="customerEmotion">&nbsp;</div>

    <div class="dialogue-box">
      <p class="dialogue-text" id="dialogueText"></p>
    </div>

    <div class="item-tag" id="itemTag">오늘의 첫 손님을 기다리는 중...</div>
  </section>

  <!-- CENTER: WASHER ZONE -->
  <section class="panel washer-zone" id="washerZone">
    <div class="panel-title">MAGIC WASHER</div>

    <div class="decor-lights" id="decorLights">
      <svg width="220" height="30" viewBox="0 0 220 30">
        <path d="M5 5 Q55 30 110 5 Q165 -20 215 5" stroke="#d8cdee" stroke-width="2" fill="none"/>
        <circle cx="10" cy="6" r="5" fill="#ffd98a"/>
        <circle cx="45" cy="16" r="5" fill="#ffb8c9"/>
        <circle cx="80" cy="9" r="5" fill="#a9e8d8"/>
        <circle cx="115" cy="4" r="5" fill="#ffd98a"/>
        <circle cx="150" cy="10" r="5" fill="#c6a9f0"/>
        <circle cx="185" cy="16" r="5" fill="#ffb8c9"/>
        <circle cx="212" cy="6" r="5" fill="#a9e8d8"/>
      </svg>
    </div>

    <div class="decor-carpet" id="decorCarpet"></div>

    <div class="decor-plant" id="decorPlant">
      <svg width="56" height="70" viewBox="0 0 56 70">
        <path d="M14 66 L18 40 H38 L42 66 Z" fill="#e6a97f"/>
        <ellipse cx="28" cy="40" rx="12" ry="4" fill="#c9885e"/>
        <path d="M28 42 C 10 30 8 8 28 4 C 24 20 26 34 28 42 Z" fill="#6fcf9b"/>
        <path d="M28 42 C 46 30 48 8 28 4 C 32 20 30 34 28 42 Z" fill="#8fe3ae"/>
        <path d="M28 42 C 20 24 30 10 28 2 C 26 14 22 26 28 42 Z" fill="#5cbf8b"/>
      </svg>
    </div>

    <div class="washer-stage" id="washerStage">
      <svg id="washerDrum" width="300" height="300" viewBox="0 0 300 300">
        <defs>
          <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f1ecfb"/>
          </linearGradient>
          <linearGradient id="chromeRim" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="22%" stop-color="#c7d1e2"/>
            <stop offset="48%" stop-color="#f6f9fc"/>
            <stop offset="72%" stop-color="#a6b1c4"/>
            <stop offset="100%" stop-color="#eef2f8"/>
          </linearGradient>
          <radialGradient id="drumGrad" cx="38%" cy="32%" r="75%">
            <stop offset="0%" stop-color="#f3fbff"/>
            <stop offset="55%" stop-color="#cfe6f5"/>
            <stop offset="100%" stop-color="#9dc2dc"/>
          </radialGradient>
          <radialGradient id="drumInnerShadow" cx="50%" cy="50%" r="52%">
            <stop offset="58%" stop-color="#28345a" stop-opacity="0"/>
            <stop offset="100%" stop-color="#28345a" stop-opacity="0.32"/>
          </radialGradient>
          <linearGradient id="glossyReflection" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="42%" stop-color="#ffffff" stop-opacity="0.4"/>
            <stop offset="58%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
          </linearGradient>
          <clipPath id="drumClip">
            <circle cx="150" cy="150" r="92"/>
          </clipPath>
        </defs>
        <rect x="14" y="14" width="272" height="272" rx="36" fill="url(#bodyGrad)" stroke="#e1d6f7" stroke-width="4"/>
        <rect x="34" y="30" width="232" height="26" rx="13" fill="#f6f1ff" stroke="#e1d6f7" stroke-width="2"/>
        <circle cx="52" cy="43" r="7" fill="#ffb8c9"/>
        <circle cx="76" cy="43" r="7" fill="#c6a9f0"/>
        <circle cx="100" cy="43" r="7" fill="#93e3cf"/>
        <circle cx="150" cy="150" r="108" fill="#dcd2f4" stroke="url(#chromeRim)" stroke-width="8"/>
        <circle cx="150" cy="150" r="92" fill="url(#drumGrad)" stroke="#a9c8dd" stroke-width="4"/>
        <circle cx="150" cy="150" r="92" fill="url(#drumInnerShadow)"/>
        <g clip-path="url(#drumClip)">
          <rect x="40" y="40" width="220" height="220" fill="url(#glossyReflection)" transform="rotate(-35 150 150)"/>
        </g>
        <path d="M 90 100 A 85 85 0 0 1 210 100" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round"/>
        <circle cx="252" cy="76" r="6" fill="#93e3cf"/>
      </svg>

      <div class="drum-overlay" id="drumOverlay">
        <svg id="itemIcon" class="item-icon" viewBox="0 0 64 64"></svg>
      </div>
    </div>

    <div class="washer-hint" id="washerHint">&nbsp;</div>

    <div class="detergent-row">
      <button class="detergent-btn btn-comfort" id="btnComfort" data-id="comfort">
        <svg width="26" height="26" viewBox="0 0 26 26"><path d="M13 2c3 4 7 8 7 13a7 7 0 1 1-14 0c0-5 4-9 7-13z" fill="#fff"/></svg>
        위로의 퐁퐁
      </button>
      <button class="detergent-btn btn-time" id="btnTime" data-id="time">
        <svg width="26" height="26" viewBox="0 0 26 26"><circle cx="13" cy="13" r="10" fill="none" stroke="#fff" stroke-width="2.4"/><path d="M13 7v6l5 3" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>
        시간의 섬유유연제
      </button>
      <button class="detergent-btn btn-courage" id="btnCourage" data-id="courage">
        <svg width="26" height="26" viewBox="0 0 26 26"><path d="M13 3 L21 7 V13 C21 19 17 22 13 23 C9 22 5 19 5 13 V7 Z" fill="#fff"/></svg>
        용기의 표백제
      </button>
    </div>
  </section>

  <!-- RIGHT: SHOP ZONE -->
  <section class="panel shop-zone">
    <div class="panel-title">TYCOON SHOP</div>

    <div class="coin-display">
      <svg width="30" height="30" viewBox="0 0 30 30">
        <circle cx="15" cy="15" r="13" fill="#ffd98a" stroke="#e0ac3c" stroke-width="2"/>
        <text x="15" y="20" font-size="14" font-weight="800" text-anchor="middle" fill="#8a6a1a">♥</text>
      </svg>
      <div>
        <div class="coin-amount" id="coinAmount">0</div>
        <div class="coin-label">마음 코인</div>
      </div>
    </div>

    <div class="shop-list" id="shopList"></div>

    <div class="shop-footer-note">손님의 마음을 정성껏 세탁하면 마음 코인을 받을 수 있어요. 코인으로 세탁소를 예쁘게 꾸며보세요.</div>
  </section>

</div>

<div class="ending-overlay" id="endingOverlay">
  <div class="ending-card">
    <h2>오늘의 세탁을 마치며</h2>
    <p>오늘 하루도 각자의 자리에서 무거운 마음을 버티어낸 당신.
당신의 지친 하루도 깨끗하게 정화되었기를 바랍니다.
고생하셨습니다.</p>
    <button class="ending-restart" id="restartBtn">처음부터 다시하기</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ---------------- DATA ---------------- */

  var customers = [
    {
      name: "신입사원 청년",
      emotion: "실패",
      itemName: "부러진 만년필",
      itemIcon: "pen",
      correctDetergent: "comfort",
      reward: 50,
      intro: "이번 프로젝트... 제가 다 망쳐버렸어요. 선배들 볼 낯이 없습니다. 이 만년필, 입사 선물로 받은 건데... 이것마저 부러져 버렸네요.",
      wrongHint: "세탁기가 덜컹거립니다. 다른 세제가 필요할 것 같습니다.",
      gratitude: "신기하네요... 마음이 한결 가벼워졌어요. 실패해도 괜찮다는 걸, 이제야 알 것 같아요. 감사합니다."
    },
    {
      name: "늙은 아버지",
      emotion: "후회",
      itemName: "낡은 시계",
      itemIcon: "watch",
      correctDetergent: "time",
      reward: 70,
      intro: "이 시계는... 아이가 어릴 때 함께해 주지 못한 시간이 고스란히 담겨 있다네. 그때로 돌아갈 수만 있다면 얼마나 좋을까.",
      wrongHint: "세탁기가 덜컹거립니다. 다른 세제가 필요할 것 같습니다.",
      gratitude: "허허... 지나간 시간이 나쁜 것만은 아니었다는 걸, 이제 알겠구먼. 고맙네."
    },
    {
      name: "상처받은 아이",
      emotion: "불안",
      itemName: "금이 간 거울",
      itemIcon: "mirror",
      correctDetergent: "courage",
      reward: 100,
      intro: "저는... 자꾸 제 모습이 이상해 보여요. 사람들 앞에 서면 심장이 너무 빨리 뛰어요. 이 거울처럼, 제 마음도 금이 가버린 것 같아요.",
      wrongHint: "세탁기가 덜컹거립니다. 다른 세제가 필요할 것 같습니다.",
      gratitude: "와... 거울 속의 제가 조금은 용감해 보여요. 감사해요, 아저씨!"
    }
  ];

  var detergents = { comfort: "위로의 퐁퐁", time: "시간의 섬유유연제", courage: "용기의 표백제" };
  var negativeWords = ["실패", "후회", "불안"];
  var positiveWords = ["성장", "배움", "평온"];

  var shopItems = [
    {
      id: "lights",
      name: "은은한 요정 조명",
      price: 50,
      icon: '<svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2 C7 2 4 6 4 10 c0 4 3 5 3 8 h10 c0-3 3-4 3-8 0-4-3-8-8-8z" fill="#ffd98a"/><rect x="9" y="19" width="6" height="3" rx="1.5" fill="#c9a35a"/></svg>'
    },
    {
      id: "plant",
      name: "초록색 치유 화분",
      price: 70,
      icon: '<svg width="24" height="24" viewBox="0 0 24 24"><path d="M8 20 L9.5 12 H14.5 L16 20 Z" fill="#c9885e"/><path d="M12 12 C4 8 4 2 12 1 C10 6 11 9 12 12 Z" fill="#6fcf9b"/><path d="M12 12 C20 8 20 2 12 1 C14 6 13 9 12 12 Z" fill="#8fe3ae"/></svg>'
    },
    {
      id: "carpet",
      name: "푹신한 파스텔 카펫",
      price: 100,
      icon: '<svg width="24" height="24" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="6" fill="#ffb8c9"/><ellipse cx="12" cy="12" rx="6" ry="3.4" fill="#ffe3ea"/></svg>'
    }
  ];

  var itemIcons = {
    pen: '<path d="M46 8 L58 20 L26 52 L14 56 L18 44 Z" fill="#c6a9f0" stroke="#7c5cc2" stroke-width="2"/><path d="M18 44 L14 56 L26 52 Z" fill="#4a4462"/><line x1="42" y1="12" x2="54" y2="24" stroke="#fff" stroke-width="3"/>',
    watch: '<circle cx="32" cy="32" r="22" fill="#fff6df" stroke="#e0ac3c" stroke-width="4"/><circle cx="32" cy="32" r="16" fill="#fffaf0" stroke="#d8cdee" stroke-width="2"/><line x1="32" y1="32" x2="32" y2="21" stroke="#4a4462" stroke-width="2.4" stroke-linecap="round"/><line x1="32" y1="32" x2="40" y2="34" stroke="#4a4462" stroke-width="2.4" stroke-linecap="round"/><rect x="27" y="4" width="10" height="8" rx="2" fill="#e0ac3c"/><rect x="27" y="52" width="10" height="8" rx="2" fill="#e0ac3c"/>',
    mirror: '<ellipse cx="32" cy="26" rx="20" ry="24" fill="#eaf6ff" stroke="#a9c8dd" stroke-width="4"/><rect x="28" y="48" width="8" height="12" rx="3" fill="#cbb9ee"/><rect x="20" y="58" width="24" height="4" rx="2" fill="#cbb9ee"/><path d="M20 8 L38 42 M30 6 L24 30" stroke="#b7d7ec" stroke-width="2"/>'
  };

  var portraits = {
    0: '<svg width="130" height="160" viewBox="0 0 130 160"><ellipse cx="65" cy="150" rx="55" ry="10" fill="#e4dcf7"/><path d="M20 150 C20 100 30 70 65 70 C100 70 110 100 110 150 Z" fill="#a9c8f0"/><circle cx="65" cy="46" r="32" fill="#ffd9b3"/><path d="M33 40 C33 14 97 14 97 40 C90 26 40 26 33 40 Z" fill="#4a4462"/><circle cx="52" cy="48" r="3" fill="#4a4462"/><circle cx="78" cy="48" r="3" fill="#4a4462"/><path d="M54 60 Q65 68 76 60" stroke="#8a5a3c" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>',
    1: '<svg width="130" height="160" viewBox="0 0 130 160"><ellipse cx="65" cy="150" rx="55" ry="10" fill="#e4dcf7"/><path d="M18 150 C18 104 30 74 65 74 C100 74 112 104 112 150 Z" fill="#c9a35a"/><circle cx="65" cy="48" r="30" fill="#f0d3ad"/><path d="M35 34 C35 20 95 20 95 34 C95 20 100 46 90 40 C88 26 42 26 40 40 C30 46 35 20 35 34 Z" fill="#e8e4e0"/><circle cx="53" cy="52" r="2.6" fill="#4a4462"/><circle cx="77" cy="52" r="2.6" fill="#4a4462"/><path d="M56 64 Q65 60 74 64" stroke="#8a6a4a" stroke-width="2.2" fill="none" stroke-linecap="round"/><path d="M50 46 Q65 40 80 46" stroke="#8a6a4a" stroke-width="2" fill="none"/></svg>',
    2: '<svg width="130" height="160" viewBox="0 0 130 160"><ellipse cx="65" cy="150" rx="50" ry="9" fill="#e4dcf7"/><path d="M28 150 C28 112 36 90 65 90 C94 90 102 112 102 150 Z" fill="#ffb8c9"/><circle cx="65" cy="58" r="28" fill="#ffe0c2"/><path d="M37 52 C37 26 93 26 93 52 C93 40 88 30 65 30 C42 30 37 40 37 52 Z" fill="#7c5cc2"/><circle cx="80" cy="26" r="6" fill="#7c5cc2"/><circle cx="53" cy="60" r="2.6" fill="#4a4462"/><circle cx="77" cy="60" r="2.6" fill="#4a4462"/><path d="M56 72 Q65 76 74 72" stroke="#c46a86" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg>'
  };

  /* ---------------- STATE ---------------- */

  var state = {
    customerIndex: 0,
    coins: 0,
    purchasedUpgrades: { lights: false, plant: false, carpet: false },
    awaitingChoice: false,
    isWashing: false,
    allServed: false,
    typeInterval: null
  };

  /* ---------------- DOM REFS ---------------- */

  var el = {
    progressPill: document.getElementById("progressPill"),
    portrait: document.getElementById("customerPortrait"),
    name: document.getElementById("customerName"),
    emotion: document.getElementById("customerEmotion"),
    dialogueText: document.getElementById("dialogueText"),
    itemTag: document.getElementById("itemTag"),
    washerStage: document.getElementById("washerStage"),
    drumOverlay: document.getElementById("drumOverlay"),
    itemIcon: document.getElementById("itemIcon"),
    washerHint: document.getElementById("washerHint"),
    btnComfort: document.getElementById("btnComfort"),
    btnTime: document.getElementById("btnTime"),
    btnCourage: document.getElementById("btnCourage"),
    coinAmount: document.getElementById("coinAmount"),
    shopList: document.getElementById("shopList"),
    decorLights: document.getElementById("decorLights"),
    decorPlant: document.getElementById("decorPlant"),
    decorCarpet: document.getElementById("decorCarpet"),
    endingOverlay: document.getElementById("endingOverlay"),
    restartBtn: document.getElementById("restartBtn"),
    washerZone: document.getElementById("washerZone")
  };

  var detergentButtons = [el.btnComfort, el.btnTime, el.btnCourage];

  /* ---------------- TYPEWRITER ---------------- */

  function typeText(targetEl, text, speed, onDone) {
    if (state.typeInterval) {
      clearInterval(state.typeInterval);
      state.typeInterval = null;
    }
    targetEl.innerHTML = "";
    targetEl.classList.remove("done");
    var chars = Array.from(text);
    var i = 0;
    state.typeInterval = setInterval(function () {
      var span = document.createElement("span");
      span.className = "char-fade";
      span.textContent = chars[i];
      targetEl.appendChild(span);
      window.requestAnimationFrame(function () {
        span.classList.add("visible");
      });
      i++;
      if (i >= chars.length) {
        clearInterval(state.typeInterval);
        state.typeInterval = null;
        targetEl.classList.add("done");
        if (onDone) onDone();
      }
    }, speed || 32);
  }

  /* ---------------- SHOP ---------------- */

  function renderShop() {
    el.shopList.innerHTML = "";
    shopItems.forEach(function (item) {
      var row = document.createElement("div");
      row.className = "shop-item";

      var iconWrap = document.createElement("div");
      iconWrap.className = "shop-item-icon";
      iconWrap.innerHTML = item.icon;

      var info = document.createElement("div");
      info.className = "shop-item-info";
      info.innerHTML =
        '<div class="shop-item-name">' + item.name + "</div>" +
        '<div class="shop-item-price">' + item.price + " 코인</div>";

      var btn = document.createElement("button");
      btn.className = "buy-btn";
      btn.textContent = state.purchasedUpgrades[item.id] ? "구매완료" : "구매하기";
      btn.disabled = state.purchasedUpgrades[item.id] || state.coins < item.price;
      btn.addEventListener("click", function () {
        buyItem(item.id, item.price);
      });

      row.appendChild(iconWrap);
      row.appendChild(info);
      row.appendChild(btn);
      el.shopList.appendChild(row);
    });
  }

  function buyItem(id, price) {
    if (state.purchasedUpgrades[id] || state.coins < price) return;
    state.coins -= price;
    state.purchasedUpgrades[id] = true;
    bumpCoins();
    if (id === "lights") el.decorLights.classList.add("visible");
    if (id === "plant") el.decorPlant.classList.add("visible");
    if (id === "carpet") el.decorCarpet.classList.add("visible");
    renderShop();
    checkEnding();
  }

  function bumpCoins() {
    el.coinAmount.textContent = state.coins;
    el.coinAmount.classList.remove("bump");
    void el.coinAmount.offsetWidth;
    el.coinAmount.classList.add("bump");
  }

  /* ---------------- CUSTOMER FLOW ---------------- */

  function startCustomer(index) {
    var customer = customers[index];
    state.awaitingChoice = false;
    state.isWashing = false;

    el.progressPill.textContent = index + " / " + customers.length;
    el.name.textContent = customer.name;
    el.emotion.textContent = "핵심 감정: " + customer.emotion;
    el.itemTag.innerHTML = "세탁물: <b>" + customer.itemName + "</b>";
    el.washerHint.classList.remove("show");
    el.washerHint.textContent = "";

    el.portrait.innerHTML = portraits[index] || portraits[0];
    el.portrait.classList.remove("show", "leaving");
    void el.portrait.offsetWidth;
    el.portrait.classList.add("show");

    el.itemIcon.innerHTML = itemIcons[customer.itemIcon];
    el.itemIcon.classList.remove("show");

    setDetergentButtonsEnabled(false);

    typeText(el.dialogueText, customer.intro, 30, function () {
      window.setTimeout(function () {
        el.itemIcon.classList.add("show");
        state.awaitingChoice = true;
        setDetergentButtonsEnabled(true);
      }, 300);
    });
  }

  function setDetergentButtonsEnabled(enabled) {
    detergentButtons.forEach(function (btn) {
      btn.disabled = !enabled;
    });
  }

  function selectDetergent(id) {
    if (!state.awaitingChoice || state.isWashing) return;
    var customer = customers[state.customerIndex];
    if (id === customer.correctDetergent) {
      runWashSuccess(customer);
    } else {
      runWashFail(customer);
    }
  }

  function runWashFail(customer) {
    el.washerStage.classList.add("shaking");
    window.setTimeout(function () {
      el.washerStage.classList.remove("shaking");
    }, 500);

    el.washerHint.textContent = customer.wrongHint;
    el.washerHint.classList.add("show");
    window.setTimeout(function () {
      el.washerHint.classList.remove("show");
    }, 2600);
  }

  function runWashSuccess(customer) {
    state.awaitingChoice = false;
    state.isWashing = true;
    setDetergentButtonsEnabled(false);
    el.washerHint.classList.remove("show");
    el.itemIcon.classList.remove("show");
    el.washerZone.classList.add("washer-spin");

    var orbitEls = [];
    negativeWords.forEach(function (word, i) {
      var orbit = document.createElement("div");
      orbit.className = "orbit-word";
      orbit.style.animationDelay = (-i * 0.87) + "s";

      var inner = document.createElement("div");
      inner.className = "orbit-word-inner";
      inner.textContent = word;
      inner.style.animationDelay = (-i * 0.87) + "s";

      orbit.appendChild(inner);
      el.drumOverlay.appendChild(orbit);
      orbitEls.push({ orbit: orbit, inner: inner });
    });

    // Step 1 (0s): words appear & spin (already happening)
    // Step 2 (~2.2s): transform into positive glowing words
    window.setTimeout(function () {
      orbitEls.forEach(function (o, i) {
        o.inner.textContent = positiveWords[i];
        o.inner.classList.add("positive");
      });
    }, 2200);

    // Step 3 (~3.6s): explode into bubbles
    window.setTimeout(function () {
      orbitEls.forEach(function (o) {
        o.orbit.classList.add("fade-out");
      });
      spawnBubbles(18);
    }, 3600);

    // Step 4 (~4.4s): cleanup orbit words
    window.setTimeout(function () {
      orbitEls.forEach(function (o) {
        if (o.orbit.parentNode) o.orbit.parentNode.removeChild(o.orbit);
      });
    }, 4300);

    // Step 5 (5s): wash complete
    window.setTimeout(function () {
      el.washerZone.classList.remove("washer-spin");
      washComplete(customer);
    }, 5000);
  }

  var bubbleStyleSheet = (function () {
    var styleEl = document.createElement("style");
    styleEl.id = "bubbleDynamicStyles";
    document.head.appendChild(styleEl);
    return styleEl.sheet;
  })();
  var bubbleCounter = 0;

  function spawnBubbles(count) {
    for (var i = 0; i < count; i++) {
      bubbleCounter++;
      var name = "bubbleFloat_" + bubbleCounter;
      var angle = Math.random() * Math.PI * 2;
      var dist = 60 + Math.random() * 70;
      var dx = Math.cos(angle) * dist;
      var dy = Math.sin(angle) * dist - 20;
      var wobbleX = (Math.random() - 0.5) * 34;
      var wobbleY = (Math.random() - 0.5) * 22;
      var duration = (1.1 + Math.random() * 0.7);

      var keyframeRule =
        "@keyframes " + name + " {" +
        "0% { transform: translate(0, 0) scale(0.5); opacity: 0.9; }" +
        "35% { transform: translate(" + (dx * 0.35 + wobbleX).toFixed(1) + "px, " + (dy * 0.35 + wobbleY).toFixed(1) + "px) scale(0.85); opacity: 1; }" +
        "70% { transform: translate(" + (dx * 0.78 - wobbleX * 0.4).toFixed(1) + "px, " + (dy * 0.78).toFixed(1) + "px) scale(1.05); opacity: 0.85; }" +
        "100% { transform: translate(" + dx.toFixed(1) + "px, " + dy.toFixed(1) + "px) scale(1.3); opacity: 0; }" +
        "}";

      try {
        bubbleStyleSheet.insertRule(keyframeRule, bubbleStyleSheet.cssRules.length);
      } catch (e) {
        /* ignore malformed rule edge-cases */
      }

      var b = document.createElement("div");
      b.className = "bubble-particle";
      b.style.left = "50%";
      b.style.top = "50%";
      b.style.animation = name + " " + duration.toFixed(2) + "s cubic-bezier(0.4, 0, 0.2, 1) forwards";
      b.style.animationDelay = (Math.random() * 0.3) + "s";
      el.drumOverlay.appendChild(b);

      (function (bubble, ruleName, totalDelayMs) {
        window.setTimeout(function () {
          if (bubble.parentNode) bubble.parentNode.removeChild(bubble);
          for (var r = bubbleStyleSheet.cssRules.length - 1; r >= 0; r--) {
            if (bubbleStyleSheet.cssRules[r].name === ruleName) {
              bubbleStyleSheet.deleteRule(r);
              break;
            }
          }
        }, totalDelayMs);
      })(b, name, duration * 1000 + 400);
    }
  }

  function washComplete(customer) {
    state.isWashing = false;
    state.coins += customer.reward;
    bumpCoins();
    renderShop();

    typeText(el.dialogueText, customer.gratitude, 28, function () {
      window.setTimeout(function () {
        el.portrait.classList.remove("show");
        el.portrait.classList.add("leaving");
        window.setTimeout(function () {
          proceedAfterCustomer();
        }, 900);
      }, 1200);
    });
  }

  function proceedAfterCustomer() {
    var nextIndex = state.customerIndex + 1;
    if (nextIndex < customers.length) {
      state.customerIndex = nextIndex;
      startCustomer(nextIndex);
    } else {
      state.allServed = true;
      el.progressPill.textContent = customers.length + " / " + customers.length;
      el.dialogueText.textContent = "오늘 예약된 손님을 모두 맞이했습니다.";
      el.dialogueText.classList.add("done");
      el.itemTag.textContent = "오늘의 세탁 영업이 끝났습니다.";
      checkEnding();
    }
  }

  /* ---------------- ENDING ---------------- */

  function checkEnding() {
    var anyPurchased = Object.keys(state.purchasedUpgrades).some(function (k) {
      return state.purchasedUpgrades[k];
    });
    if (state.allServed && anyPurchased) {
      showEnding();
    }
  }

  function showEnding() {
    el.endingOverlay.classList.add("visible");
  }

  /* ---------------- INIT / RESTART ---------------- */

  function resetGame() {
    state.customerIndex = 0;
    state.coins = 0;
    state.purchasedUpgrades = { lights: false, plant: false, carpet: false };
    state.awaitingChoice = false;
    state.isWashing = false;
    state.allServed = false;

    el.decorLights.classList.remove("visible");
    el.decorPlant.classList.remove("visible");
    el.decorCarpet.classList.remove("visible");
    el.endingOverlay.classList.remove("visible");
    el.washerZone.classList.remove("washer-spin");
    el.coinAmount.textContent = "0";

    renderShop();
    startCustomer(0);
  }

  function init() {
    el.btnComfort.addEventListener("click", function () { selectDetergent("comfort"); });
    el.btnTime.addEventListener("click", function () { selectDetergent("time"); });
    el.btnCourage.addEventListener("click", function () { selectDetergent("courage"); });
    el.restartBtn.addEventListener("click", resetGame);

    renderShop();
    startCustomer(0);
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
