<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Lie Button · 규칙 변환 퍼즐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --ink: #4a3f2f;
    --ink-soft: #7a6b52;
    --outline: #3a2e22;
    --panel-bg: rgba(255, 252, 240, 0.62);
    --panel-border: rgba(255, 255, 255, 0.7);

    --forest: #7fc98f;
    --forest-deep: #4f9b62;
    --sky: #a8dcf0;
    --sky-deep: #5fb0d8;
    --earth: #d9ac78;
    --earth-deep: #a97847;
    --mint: #a8ecd4;
    --mint-deep: #5fcda3;
    --lavender: #cdb8ec;
    --lavender-deep: #9c7ed9;
    --coral: #f0a3a3;
    --coral-deep: #d97070;
    --gold: #f5d789;

    --shadow: 0 6px 0 0 var(--outline);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: 'Press Start 2P', 'Consolas', 'Malgun Gothic', 'Courier New', monospace;
    color: var(--ink);
  }

  body {
    background: linear-gradient(180deg, #cdeeff 0%, #dff6e6 55%, #eaf7d8 100%);
    min-height: 100vh;
    padding: 20px 14px 40px;
    image-rendering: pixelated;
  }

  h1, h2, h3, p { margin: 0; }
  button { font-family: inherit; }
  ul { list-style: none; margin: 0; padding: 0; }

  .app { max-width: 980px; margin: 0 auto; }

  .title-bar { text-align: center; margin-bottom: 20px; }
  .title-bar h1 {
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--outline);
    text-shadow: 3px 3px 0 rgba(159, 214, 178, 0.7), 0 0 16px rgba(255, 255, 255, 0.6);
  }
  .title-bar span {
    display: block;
    font-size: 9px;
    color: var(--ink-soft);
    margin-top: 10px;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  .layout {
    display: grid;
    grid-template-columns: 270px 1fr;
    gap: 18px;
    align-items: start;
  }

  /* ---------- PIXEL PANEL / BORDER SYSTEM ---------- */
  .panel {
    background: var(--panel-bg);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 3px solid var(--outline);
    box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.55);
    filter: drop-shadow(0 5px 0 var(--outline));
    clip-path: polygon(
      0 8px, 8px 8px, 8px 0,
      calc(100% - 8px) 0, calc(100% - 8px) 8px, 100% 8px,
      100% calc(100% - 8px), calc(100% - 8px) calc(100% - 8px), calc(100% - 8px) 100%,
      8px 100%, 8px calc(100% - 8px), 0 calc(100% - 8px)
    );
    padding: 18px;
  }

  /* ---------- RULES PANEL ---------- */
  .stage-info {
    display: inline-block;
    background: var(--forest-deep);
    color: #fff;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 7px 12px;
    border: 2px solid var(--outline);
    box-shadow: 2px 2px 0 var(--outline);
    margin-bottom: 14px;
  }

  .rules-panel h2 {
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .rule-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

  .rule-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.8);
    border: 2px solid var(--outline);
    box-shadow: 3px 3px 0 var(--outline);
    padding: 10px;
    cursor: pointer;
    text-align: left;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
  }
  .rule-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--outline); }
  .rule-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--outline); }

  .rule-checkbox {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    border: 2px solid var(--outline);
    background: #fff;
    position: relative;
    transition: background 0.2s ease;
  }

  .rule-item.lied .rule-btn {
    background: linear-gradient(180deg, #ffe4e4, #ffd0d9);
    border-color: var(--coral-deep);
    box-shadow: 3px 3px 0 var(--coral-deep);
  }
  .rule-item.lied .rule-checkbox {
    background: var(--coral-deep);
    border-color: var(--outline);
  }
  .rule-item.lied .rule-checkbox::after {
    content: "";
    position: absolute;
    inset: 3px;
    background:
      linear-gradient(45deg, transparent 40%, #fff 40%, #fff 60%, transparent 60%),
      linear-gradient(-45deg, transparent 40%, #fff 40%, #fff 60%, transparent 60%);
  }

  .rule-text { display: flex; flex-direction: column; flex: 1; min-width: 0; gap: 5px; }
  .rule-label {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.4;
  }
  .rule-status {
    font-size: 8px;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
  }
  .rule-item.lied .rule-status { color: var(--coral-deep); }

  .rule-hint {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    font-size: 11.5px;
    line-height: 1.7;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.6);
    border: 2px solid rgba(58, 46, 34, 0.25);
    padding: 10px 12px;
    margin-bottom: 16px;
  }

  .legend { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .legend-row {
    display: flex; align-items: center; gap: 8px;
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    font-size: 11.5px; color: var(--ink-soft);
  }
  .legend-swatch { width: 14px; height: 14px; flex-shrink: 0; border: 2px solid var(--outline); }

  .action-btn {
    width: 100%;
    border: 2px solid var(--outline);
    padding: 12px;
    font-size: 10px;
    letter-spacing: 0.5px;
    color: #fff;
    cursor: pointer;
    background: var(--lavender-deep);
    box-shadow: 3px 3px 0 var(--outline);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .action-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--outline); }
  .action-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--outline); }

  /* ---------- MAP PANEL ---------- */
  .map-panel { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .grid-wrap {
    width: 100%;
    max-width: 460px;
    aspect-ratio: 1 / 1;
    position: relative;
    border: 4px solid var(--outline);
    box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.5);
    filter: drop-shadow(0 6px 0 var(--outline));
  }

  .grid {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    grid-template-rows: repeat(10, 1fr);
    overflow: hidden;
    background: #cdeecb;
  }

  .grid.shake { animation: gridShake 0.35s ease; }
  @keyframes gridShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid rgba(58, 46, 34, 0.15);
  }

  /* ---- WALL: hedge block ---- */
  .tile-wall {
    background-color: var(--forest-deep);
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.18) 0 30%, transparent 30%),
      repeating-linear-gradient(90deg, rgba(58, 46, 34, 0.18) 0 2px, transparent 2px 10px),
      repeating-linear-gradient(0deg, rgba(58, 46, 34, 0.12) 0 2px, transparent 2px 10px);
    box-shadow: inset 0 -4px 0 rgba(58, 46, 34, 0.25), inset 0 3px 0 rgba(255, 255, 255, 0.2);
  }

  /* ---- FLOOR: grass w/ speckle tufts ---- */
  .tile-floor {
    background-color: var(--forest);
    background-image:
      radial-gradient(circle at 22% 28%, #9fdc9f 0 18%, transparent 19%),
      radial-gradient(circle at 72% 62%, #9fdc9f 0 16%, transparent 17%),
      radial-gradient(circle at 50% 85%, #6fbb7f 0 14%, transparent 15%);
  }
  .grid .cell.tile-floor:nth-child(11n+3)::after,
  .grid .cell.tile-floor:nth-child(17n+6)::after {
    content: "";
    position: absolute;
    width: 22%;
    height: 22%;
    left: 38%;
    top: 30%;
    background: radial-gradient(circle, #fff2f8 0 30%, transparent 32%), var(--coral);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    opacity: 0.85;
  }

  /* ---- EXIT: glowing pixel portal ---- */
  .tile-exit {
    background: radial-gradient(circle, #f2e9ff 0%, var(--lavender) 55%, var(--lavender-deep) 100%);
    animation: portalGlow 1.7s ease-in-out infinite;
  }
  @keyframes portalGlow {
    0%, 100% { box-shadow: inset 0 0 8px rgba(156, 126, 217, 0.5); }
    50% { box-shadow: inset 0 0 16px rgba(156, 126, 217, 0.9); }
  }
  .tile-exit::before, .tile-exit::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--gold);
    box-shadow: 0 0 4px var(--gold);
    animation: sparkleFloat 1.5s ease-in-out infinite;
  }
  .tile-exit::before { left: 22%; top: 28%; animation-delay: 0s; }
  .tile-exit::after { left: 68%; top: 62%; animation-delay: 0.55s; }
  @keyframes sparkleFloat {
    0%, 100% { opacity: 0.15; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-4px); }
  }
  .exit-sword { position: relative; z-index: 2; width: 42%; height: 62%; }
  .exit-sword svg { width: 100%; height: 100%; }

  /* ---- WATER ---- */
  .tile-water {
    background-color: var(--sky-deep);
    background-image:
      linear-gradient(180deg, var(--sky) 0%, var(--sky-deep) 100%),
      repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.45) 0 2px, transparent 2px 9px);
    transition: background-color 0.3s ease, opacity 0.3s ease, filter 0.3s ease;
  }
  .tile-water.passable {
    background-color: #eaf7ff;
    background-image:
      linear-gradient(180deg, #f2fbff 0%, #dcf0fb 100%),
      repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.6) 0 2px, transparent 2px 9px);
    opacity: 0.8;
    box-shadow: inset 0 0 0 2px rgba(95, 176, 216, 0.4);
  }

  /* ---- SPIKE ---- */
  .tile-spike {
    background-color: #e6b596;
    background-image: repeating-linear-gradient(45deg, rgba(58, 46, 34, 0.08) 0 3px, transparent 3px 8px);
    transition: background-color 0.3s ease, opacity 0.3s ease;
  }
  .tile-spike.passable { background-color: #f2ead8; opacity: 0.9; }
  .spike-row { display: flex; align-items: flex-end; justify-content: center; width: 86%; height: 70%; gap: 1px; }
  .spike-ico { flex: 1; height: 100%; }
  .spike-ico svg { width: 100%; height: 100%; transition: filter 0.3s ease, opacity 0.3s ease; }
  .tile-spike.passable .spike-ico svg { filter: grayscale(0.75) brightness(1.2); opacity: 0.55; }

  /* ---- DOOR ---- */
  .tile-door {
    background-color: var(--earth);
    background-image: repeating-linear-gradient(90deg, #c9986a 0 7px, #b98552 7px 14px);
    box-shadow: inset 0 0 0 3px var(--outline);
    transition: background-color 0.3s ease, opacity 0.3s ease;
  }
  .tile-door.passable {
    background-color: #f0d7ae;
    background-image: repeating-linear-gradient(90deg, #f0d7ae 0 7px, #e8c99a 7px 14px);
    opacity: 0.9;
  }

  .tile-icon { font-size: clamp(10px, 2.6vw, 16px); pointer-events: none; user-select: none; }

  /* ---- PLAYER SPRITE ---- */
  .player {
    position: absolute;
    width: 10%;
    height: 10%;
    left: 0;
    top: 0;
    z-index: 5;
    transition: left 0.15s ease, top 0.15s ease;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .player.no-anim { transition: none !important; }
  .player svg {
    width: 86%;
    height: 86%;
    image-rendering: pixelated;
    filter: drop-shadow(0 2px 0 rgba(58, 46, 34, 0.35));
  }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(2, 52px);
    gap: 8px;
    justify-content: center;
  }
  .dpad button {
    border: 2px solid var(--outline);
    background: var(--panel-bg);
    box-shadow: 3px 3px 0 var(--outline);
    font-size: 16px;
    color: var(--forest-deep);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .dpad button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--outline); }
  .dpad button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--outline); }
  .dpad-up { grid-column: 2; grid-row: 1; }
  .dpad-left { grid-column: 1; grid-row: 2; }
  .dpad-down { grid-column: 2; grid-row: 2; }
  .dpad-right { grid-column: 3; grid-row: 2; }

  .kbd-hint {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    font-size: 11.5px; color: var(--ink-soft); text-align: center;
  }

  /* ---------- MODAL ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(58, 46, 34, 0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 50;
    padding: 20px;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: auto; }
  .modal-card {
    background: linear-gradient(180deg, #fffdf5, #fbf2e0);
    border: 3px solid var(--outline);
    box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6);
    filter: drop-shadow(0 6px 0 var(--outline));
    clip-path: polygon(
      0 10px, 10px 10px, 10px 0,
      calc(100% - 10px) 0, calc(100% - 10px) 10px, 100% 10px,
      100% calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 100%,
      10px 100%, 10px calc(100% - 10px), 0 calc(100% - 10px)
    );
    padding: 34px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  .modal-overlay.visible .modal-card { transform: translateY(0) scale(1); }
  .modal-card h2 { font-size: 15px; margin-bottom: 16px; color: var(--forest-deep); line-height: 1.6; }
  .modal-card p {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    font-size: 13.5px; line-height: 1.8; color: var(--ink); margin-bottom: 22px;
  }

  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    .legend { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="title-bar">
    <h1>🔀 Lie Button</h1>
    <span>규칙을 거짓으로 바꿔, 진실 너머로 나아가라</span>
  </div>

  <div class="layout">
    <aside class="panel rules-panel">
      <div class="stage-info">STAGE <span id="stageNum">1</span> / 5</div>
      <h2>규칙 (RULES)</h2>
      <ul class="rule-list" id="ruleList"></ul>
      <p class="rule-hint">규칙을 클릭하면 그 규칙만 <b>거짓(LIE)</b>이 됩니다. 다른 규칙을 누르면 이전 규칙은 다시 참으로 돌아가요.</p>

      <div class="legend">
        <div class="legend-row"><span class="legend-swatch" style="background:var(--forest-deep);"></span>벽 (통과 불가)</div>
        <div class="legend-row"><span class="legend-swatch" style="background:var(--sky-deep);"></span>물</div>
        <div class="legend-row"><span class="legend-swatch" style="background:var(--coral-deep);"></span>가시</div>
        <div class="legend-row"><span class="legend-swatch" style="background:var(--earth-deep);"></span>문</div>
        <div class="legend-row"><span class="legend-swatch" style="background:var(--lavender-deep);"></span>출구</div>
      </div>

      <button id="resetBtn" class="action-btn">🔄 이 스테이지 재시작</button>
    </aside>

    <main class="panel map-panel">
      <div class="grid-wrap">
        <div class="grid" id="grid"></div>
      </div>
      <div class="dpad" id="dpad">
        <button class="dpad-up" data-dir="up">▲</button>
        <button class="dpad-left" data-dir="left">◀</button>
        <button class="dpad-down" data-dir="down">▼</button>
        <button class="dpad-right" data-dir="right">▶</button>
      </div>
      <p class="kbd-hint">방향키 또는 WASD로 이동할 수 있어요.</p>
    </main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <h2 id="modalTitle"></h2>
    <p id="modalText"></p>
    <button id="modalBtn" class="action-btn"></button>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ---------------- PIXEL SPRITE HELPER ---------------- */

  function pixelSvg(rows, palette) {
    var w = rows[0].length;
    var h = rows.length;
    var rects = "";
    for (var y = 0; y < h; y++) {
      for (var x = 0; x < w; x++) {
        var ch = rows[y][x];
        var color = palette[ch];
        if (!color) continue;
        rects += '<rect x="' + x + '" y="' + y + '" width="1" height="1" fill="' + color + '"/>';
      }
    }
    return '<svg viewBox="0 0 ' + w + ' ' + h + '" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">' + rects + "</svg>";
  }

  var PLAYER_PIXELS = [
    "..........",
    "..KKKKKK..",
    "KHHHHHHHHK",
    "KHHHHHHHHK",
    "KSSSSSSSSK",
    "KSSESSESSK",
    "KSSSSSSSSK",
    "KOOOOOOOOK",
    "KOOOOOOOOK",
    "..PPPPPP.."
  ];
  var PLAYER_PALETTE = {
    K: "#3a2e22",
    H: "#cdb8ec",
    S: "#ffe0c2",
    E: "#3a2e22",
    O: "#7fc98f",
    P: "#a97847"
  };
  var PLAYER_SVG = pixelSvg(PLAYER_PIXELS, PLAYER_PALETTE);

  var SPIKE_PIXELS = [
    "..KKKK..",
    ".KCCCCK.",
    ".KCCCCK.",
    "KCCCCCCK",
    "KCCCCCCK",
    "KKKKKKKK"
  ];
  var SPIKE_PALETTE = { K: "#3a2e22", C: "#f0a3a3" };
  var SPIKE_SVG = pixelSvg(SPIKE_PIXELS, SPIKE_PALETTE);

  var SWORD_PIXELS = [
    "..KK..",
    "..KK..",
    "..BB..",
    "..BB..",
    "..BB..",
    ".KKKK.",
    "..HH..",
    "..GG.."
  ];
  var SWORD_PALETTE = { K: "#3a2e22", B: "#e2ecf0", H: "#8a5a35", G: "#f5d789" };
  var SWORD_SVG = pixelSvg(SWORD_PIXELS, SWORD_PALETTE);

  var SPIKE_ROW_HTML =
    '<div class="spike-row">' +
    '<span class="spike-ico">' + SPIKE_SVG + "</span>" +
    '<span class="spike-ico">' + SPIKE_SVG + "</span>" +
    '<span class="spike-ico">' + SPIKE_SVG + "</span>" +
    "</div>";

  /* ---------------- DATA ---------------- */

  var rules = [
    { id: "water", label: "물은 지나갈 수 없다", tile: "W" },
    { id: "spike", label: "가시는 위험하다", tile: "S" },
    { id: "door", label: "문은 잠겨있다", tile: "D" }
  ];

  var stages = [
    {
      grid: [
        "##########",
        "#P.......#",
        "########.#",
        "#..WWW...#",
        "#.########",
        "#........#",
        "########.#",
        "#E.......#",
        "##########",
        "##########"
      ]
    },
    {
      grid: [
        "##########",
        "#P.......#",
        "########.#",
        "#........#",
        "#.########",
        "#..SSS...#",
        "########.#",
        "#E.......#",
        "##########",
        "##########"
      ]
    },
    {
      grid: [
        "##########",
        "#P.......#",
        "########.#",
        "#........#",
        "#.########",
        "#........#",
        "########.#",
        "#E..DDD..#",
        "##########",
        "##########"
      ]
    },
    {
      grid: [
        "##########",
        "#P.......#",
        "########.#",
        "#..WWW...#",
        "#.########",
        "#..SSS...#",
        "########.#",
        "#E.......#",
        "##########",
        "##########"
      ]
    },
    {
      grid: [
        "##########",
        "#P.......#",
        "########.#",
        "#..WWW...#",
        "#.########",
        "#..SSS...#",
        "########.#",
        "#E..DDD..#",
        "##########",
        "##########"
      ]
    }
  ];

  /* ---------------- STATE ---------------- */

  var state = {
    stageIndex: 0,
    liedRuleId: null,
    grid: [],
    playerPos: { r: 0, c: 0 },
    locked: false
  };

  var el = {
    stageNum: document.getElementById("stageNum"),
    ruleList: document.getElementById("ruleList"),
    grid: document.getElementById("grid"),
    resetBtn: document.getElementById("resetBtn"),
    dpad: document.getElementById("dpad"),
    modalOverlay: document.getElementById("modalOverlay"),
    modalTitle: document.getElementById("modalTitle"),
    modalText: document.getElementById("modalText"),
    modalBtn: document.getElementById("modalBtn")
  };

  var playerEl = null;

  /* ---------------- RULE / PASSABILITY LOGIC ---------------- */

  function isPassable(ch) {
    if (ch === "#") return false;
    if (ch === "W") return state.liedRuleId === "water";
    if (ch === "S") return state.liedRuleId === "spike";
    if (ch === "D") return state.liedRuleId === "door";
    return true;
  }

  function tileClass(ch) {
    switch (ch) {
      case "#": return "tile-wall";
      case ".": return "tile-floor";
      case "E": return "tile-exit";
      case "W": return "tile-water" + (isPassable(ch) ? " passable" : "");
      case "S": return "tile-spike" + (isPassable(ch) ? " passable" : "");
      case "D": return "tile-door" + (isPassable(ch) ? " passable" : "");
      default: return "tile-floor";
    }
  }

  function tileIcon(ch) {
    if (ch === "S") return SPIKE_ROW_HTML;
    if (ch === "D") return '<span class="tile-icon">' + (isPassable(ch) ? "🔓" : "🔒") + "</span>";
    if (ch === "E") return '<span class="exit-sword">' + SWORD_SVG + "</span>";
    return "";
  }

  /* ---------------- RENDER ---------------- */

  function renderGrid() {
    el.grid.innerHTML = "";
    for (var r = 0; r < 10; r++) {
      for (var c = 0; c < 10; c++) {
        var ch = state.grid[r][c];
        var cell = document.createElement("div");
        cell.className = "cell " + tileClass(ch);
        cell.innerHTML = tileIcon(ch);
        el.grid.appendChild(cell);
      }
    }
    if (!playerEl) {
      playerEl = document.createElement("div");
      playerEl.className = "player";
      playerEl.innerHTML = PLAYER_SVG;
    }
    el.grid.appendChild(playerEl);
  }

  function updatePlayerPosition(instant) {
    if (instant) playerEl.classList.add("no-anim");
    playerEl.style.left = (state.playerPos.c * 10) + "%";
    playerEl.style.top = (state.playerPos.r * 10) + "%";
    if (instant) {
      void playerEl.offsetWidth;
      playerEl.classList.remove("no-anim");
    }
  }

  function renderRules() {
    el.ruleList.innerHTML = "";
    rules.forEach(function (rule) {
      var lied = state.liedRuleId === rule.id;
      var li = document.createElement("li");
      li.className = "rule-item" + (lied ? " lied" : "");

      var btn = document.createElement("button");
      btn.className = "rule-btn";
      btn.type = "button";
      btn.innerHTML =
        '<span class="rule-checkbox"></span>' +
        '<span class="rule-text">' +
        '<span class="rule-label">' + rule.label + "</span>" +
        '<span class="rule-status">' + (lied ? "거짓 (LIE)" : "참 (TRUE)") + "</span>" +
        "</span>";
      btn.addEventListener("click", function () {
        toggleRule(rule.id);
      });

      li.appendChild(btn);
      el.ruleList.appendChild(li);
    });
  }

  function toggleRule(id) {
    if (state.locked) return;
    state.liedRuleId = (state.liedRuleId === id) ? null : id;
    renderRules();
    renderGrid();
    updatePlayerPosition(true);
  }

  /* ---------------- STAGE FLOW ---------------- */

  function loadStage(index) {
    state.stageIndex = index;
    state.liedRuleId = null;
    state.locked = false;

    var rows = stages[index].grid.slice();
    var gridChars = rows.map(function (row) { return row.split(""); });

    for (var r = 0; r < 10; r++) {
      for (var c = 0; c < 10; c++) {
        if (gridChars[r][c] === "P") {
          state.playerPos = { r: r, c: c };
          gridChars[r][c] = ".";
        }
      }
    }
    state.grid = gridChars;

    el.stageNum.textContent = index + 1;
    renderRules();
    renderGrid();
    updatePlayerPosition(true);
  }

  function shakeBlocked() {
    el.grid.classList.remove("shake");
    void el.grid.offsetWidth;
    el.grid.classList.add("shake");
  }

  function move(dr, dc) {
    if (state.locked) return;
    var nr = state.playerPos.r + dr;
    var nc = state.playerPos.c + dc;
    if (nr < 0 || nr > 9 || nc < 0 || nc > 9) return;

    var ch = state.grid[nr][nc];
    if (!isPassable(ch)) {
      shakeBlocked();
      return;
    }

    state.playerPos = { r: nr, c: nc };
    updatePlayerPosition(false);

    if (ch === "E") {
      onStageClear();
    }
  }

  function onStageClear() {
    state.locked = true;
    if (state.stageIndex < stages.length - 1) {
      showModal(
        "스테이지 클리어! 🎉",
        (state.stageIndex + 1) + "단계를 통과했습니다. 다음 규칙 퍼즐이 기다리고 있어요.",
        "다음 스테이지로 →",
        function () {
          hideModal();
          loadStage(state.stageIndex + 1);
        }
      );
    } else {
      showModal(
        "축하합니다! 🏆",
        "모든 5개 스테이지를 클리어했습니다. 당신은 진짜 'Lie Button' 마스터입니다!",
        "처음부터 다시하기",
        function () {
          hideModal();
          loadStage(0);
        }
      );
    }
  }

  /* ---------------- MODAL ---------------- */

  function showModal(title, text, btnLabel, onClick) {
    el.modalTitle.textContent = title;
    el.modalText.textContent = text;
    el.modalBtn.textContent = btnLabel;
    el.modalBtn.onclick = onClick;
    el.modalOverlay.classList.add("visible");
  }

  function hideModal() {
    el.modalOverlay.classList.remove("visible");
  }

  /* ---------------- INPUT ---------------- */

  var keyMap = {
    ArrowUp: [-1, 0], w: [-1, 0], W: [-1, 0],
    ArrowDown: [1, 0], s: [1, 0], S: [1, 0],
    ArrowLeft: [0, -1], a: [0, -1], A: [0, -1],
    ArrowRight: [0, 1], d: [0, 1], D: [0, 1]
  };

  var dirDeltas = {
    up: [-1, 0], down: [1, 0], left: [0, -1], right: [0, 1]
  };

  function init() {
    document.addEventListener("keydown", function (e) {
      var delta = keyMap[e.key];
      if (!delta) return;
      if (e.key.indexOf("Arrow") === 0) e.preventDefault();
      move(delta[0], delta[1]);
    });

    el.dpad.addEventListener("click", function (e) {
      var btn = e.target.closest("button[data-dir]");
      if (!btn) return;
      var delta = dirDeltas[btn.dataset.dir];
      if (delta) move(delta[0], delta[1]);
    });

    el.resetBtn.addEventListener("click", function () {
      hideModal();
      loadStage(state.stageIndex);
    });

    loadStage(0);
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
